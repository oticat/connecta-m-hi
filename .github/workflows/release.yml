name: Release IPK

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from control/control
        run: |
          VERSION=$(grep '^Version:' control/control | sed 's/^Version: //;s/-.*//')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: could not parse valid version from control/control (got: '$VERSION')"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing v$VERSION"

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "ERROR: tag v$VERSION already exists"
            exit 1
          fi

      - name: Build IPK
        run: |
          sudo apt-get install -y binutils
          bash build.sh

      - name: Verify artifact
        run: |
          IPK="out/dom.oti.cat_${VERSION}-1_all.ipk"
          test -f "$IPK" || { echo "IPK not found: $IPK"; exit 1; }
          echo "IPK_PATH=$IPK" >> "$GITHUB_ENV"
          ls -lh "$IPK"

      - name: Create and push tag
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: |
            ## connecta-m'hi v${{ env.VERSION }}

            ### Install on SMHUB Nano MG24

            Download `dom.oti.cat_${{ env.VERSION }}-1_all.ipk` below, copy it to your SMHUB and install:

            ```bash
            scp dom.oti.cat_${{ env.VERSION }}-1_all.ipk smlight@smhub.local:/tmp/
            ssh smlight@smhub.local "sudo opkg remove dom.oti.cat; sudo opkg install /tmp/dom.oti.cat_${{ env.VERSION }}-1_all.ipk"
            ```

            See the [README](https://github.com/${{ github.repository }}#readme) for full setup instructions.
          files: ${{ env.IPK_PATH }}
          fail_on_unmatched_files: true
